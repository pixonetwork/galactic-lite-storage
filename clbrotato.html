<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brotato</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #canvas { display: block; width: 100vw !important; height: 100vh !important; position: fixed; top: 0; left: 0; border: none; outline: none; object-fit: fill; }
        
        #loader-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            width: 80%;
            max-width: 500px;
            font-family: 'Orbitron', sans-serif;
        }

        #status {
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: rainbow 3s linear infinite;
        }

        /* The Visual Progress Bar */
        #progress-bar-wrap {
            width: 100%;
            height: 10px;
            background: #222;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #444;
        }

        #progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #500, #f00);
            box-shadow: 0 0 10px #f00;
            transition: width 0.2s ease;
        }

        @keyframes rainbow { to { background-position: 200% center; } }
    </style>
    <!-- [COI-ServiceWorker](https://github.com/gzuidhof/coi-serviceworker) is required for SharedArrayBuffer -->
    <script src="https://fastly.jsdelivr.net/gh/gzuidhof/coi-serviceworker@latest/coi-serviceworker.min.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="loader-container">
        <div id="status"><i class="fas fa-compact-disc fa-spin"></i> INITIALIZING...</div>
        <div id="progress-bar-wrap">
            <div id="progress-bar-fill"></div>
        </div>
    </div>

    <script src="https://unpkg.com/brotato@latest/index.js"></script>
    <script>
    (function() {
        'use strict';
        const BASE_URL = "https://unpkg.com/brotato@latest/";
        const TOTAL_BYTES = 163 * 1024 * 1024; // 163 MB
        const CHUNKS = {
            "index.pck": { count: 8, pattern: (i) => `index.pck.part${i}` },
            "index.wasm": { count: 2, pattern: (i) => `index.wasm.${i}` }
        };

        const statusEl = document.getElementById('status');
        const progressFill = document.getElementById('progress-bar-fill');
        const progressTracker = {};

        function updateUI() {
            const loadedBytes = Object.values(progressTracker).reduce((a, b) => a + b, 0);
            const percent = Math.min((loadedBytes / TOTAL_BYTES) * 100, 100);
            const currentMB = (loadedBytes / 1048576).toFixed(1);
            const totalMB = (TOTAL_BYTES / 1048576).toFixed(1);
            
            statusEl.innerHTML = `<i class="fas fa-compact-disc fa-spin"></i> LOADING: ${currentMB}MB / ${totalMB}MB`;
            progressFill.style.width = percent + "%";
        }

        async function fetchAndMerge(targetName, config) {
            const downloadPromises = [];
            for (let i = 1; i <= config.count; i++) {
                const chunkName = config.pattern(i);
                const url = BASE_URL + chunkName;
                progressTracker[chunkName] = 0;
                
                const promise = fetch(url).then(async (response) => {
                    if (!response.ok) throw new Error(`Failed to fetch ${chunkName}`);
                    const reader = response.body.getReader();
                    const chunks = [];
                    while(true) {
                        const {done, value} = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        progressTracker[chunkName] += value.length;
                        updateUI();
                    }
                    return new Blob(chunks);
                });
                downloadPromises.push(promise);
            }
            const blobs = await Promise.all(downloadPromises);
            return new Blob(blobs, { type: targetName.endsWith('.wasm') ? 'application/wasm' : 'application/octet-stream' });
        }

        const originalFetch = window.fetch;
        window.fetch = async function(resource, init) {
            const urlString = typeof resource === 'string' ? resource : resource.url;
            for (const [targetName, config] of Object.entries(CHUNKS)) {
                if (urlString.endsWith(targetName)) {
                    try {
                        const mergedBlob = await fetchAndMerge(targetName, config);
                        return new Response(mergedBlob, { status: 200, statusText: "OK" });
                    } catch (error) {
                        statusEl.innerText = "DOWNLOAD ERROR";
                        console.error(error);
                    }
                }
            }
            return originalFetch(resource, init);
        };

        const godot = new Godot({
            onProgress: function(current, total) {
                // Fallback for non-chunked files (e.g. audio)
                if (total > 0 && Object.keys(progressTracker).length === 0) {
                    const percent = (current / total) * 100;
                    progressFill.style.width = percent + "%";
                    statusEl.innerHTML = `<i class="fas fa-compact-disc fa-spin"></i> STARTING ENGINE...`;
                }
            }
        });

        godot.startGame({
            executable: "index",
            canvas: document.getElementById("canvas"),
            afterStart: function() {
                document.getElementById('loader-container').style.display = "none";
            }
        });
    })();
    </script>
</body>
</html>
