<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brotato</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #canvas { display: block; width: 100vw !important; height: 100vh !important; position: fixed; top: 0; left: 0; border: none; outline: none; object-fit: fill; }
        #status { position: absolute; top: 30px; left: 0; width: 100%; z-index: 10; text-align: center; font-family: 'Orbitron', sans-serif; font-size: 22px; letter-spacing: 3px; background: linear-gradient(to right, #500, #550, #050, #055, #005, #505, #500); background-size: 200% auto; color: transparent; -webkit-background-clip: text; background-clip: text; animation: rainbow 3s linear infinite; pointer-events: none; text-shadow: 0 0 10px rgba(255,255,255,0.1); }
        #status i { margin-right: 15px; }
        @keyframes rainbow { to { background-position: 200% center; } }
    </style>
    <!-- Cross-Origin Isolation required for Godot 4 shared array buffers -->
    <script src="https://fastly.jsdelivr.net/gh/gzuidhof/coi-serviceworker@latest/coi-serviceworker.min.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="status"><i class="fas fa-compact-disc fa-spin"></i> LOADING...</div>

    <!-- Load the main Godot engine loader script -->
    <script src="index.js"></script>

    <script>
        (function() {
            'use strict';

            // CONFIGURATION: Set asset details here
            const BASE_URL = "https://fastly.jsdelivr.net/gh/pixonetwork/brotato@main/"; // Path to your chunk files
            const TOTAL_BYTES = 163 * 1024 * 1024; // 163 MB estimated total size

            const CHUNKS = {
                "index.pck": { count: 8, pattern: (i) => `index.pck.part${i}` },
                "index.wasm": { count: 2, pattern: (i) => `index.wasm.${i}` }
            };

            const statusEl = document.getElementById('status');
            const progressTracker = {};

            function updateUI() {
                const loadedBytes = Object.values(progressTracker).reduce((a, b) => a + b, 0);
                const currentMB = (loadedBytes / 1048576).toFixed(2);
                const totalMB = (TOTAL_BYTES / 1048576).toFixed(2);
                statusEl.innerHTML = `<i class="fas fa-compact-disc fa-spin"></i> LOADING: ${currentMB} / ${totalMB} MB`;
            }

            // Downloads chunks in parallel, updates progress, and merges them into one Blob
            async function fetchAndMerge(targetName, config) {
                const downloadPromises = [];

                for (let i = 1; i <= config.count; i++) {
                    const chunkName = config.pattern(i);
                    const url = BASE_URL + chunkName;
                    
                    progressTracker[chunkName] = 0;

                    const promise = fetch(url).then(async (response) => {
                        if (!response.ok) throw new Error(`Failed to fetch ${chunkName}`);
                        
                        // Track download progress of individual chunk
                        const reader = response.body.getReader();
                        const chunks = [];
                        
                        while(true) {
                            const {done, value} = await reader.read();
                            if (done) break;
                            chunks.push(value);
                            progressTracker[chunkName] += value.length;
                            updateUI();
                        }
                        
                        return new Blob(chunks);
                    });
                    downloadPromises.push(promise);
                }

                const blobs = await Promise.all(downloadPromises);
                return new Blob(blobs, { type: targetName.endsWith('.wasm') ? 'application/wasm' : 'application/octet-stream' });
            }

            // Intercept Godot's fetch initialization requests
            window.fetch = async function(resource, init) {
                const urlString = typeof resource === 'string' ? resource : resource.url;
                
                for (const [targetName, config] of Object.entries(CHUNKS)) {
                    if (urlString.endsWith(targetName)) {
                        try {
                            const mergedBlob = await fetchAndMerge(targetName, config);
                            return new Response(mergedBlob, { status: 200, statusText: "OK" });
                        } catch (error) {
                            statusEl.innerText = "DOWNLOAD ERROR";
                            console.error(error);
                        }
                    }
                }
                return originalFetch(resource, init);
            };
            const originalFetch = window.fetch;

            // Start Godot engine instance loading
            const godot = new Godot({
                onProgress: function(current, total) {
                    // Fallback progress for other elements like audio worklets if not tracked
                    if (total > 0 && Object.keys(progressTracker).length === 0) {
                        statusEl.innerHTML = `<i class="fas fa-compact-disc fa-spin"></i> LOADING: ${(current / 1048576).toFixed(2)} MB`;
                    }
                }
            });

            godot.startGame({
                executable: "index", // Base filename for index.wasm / index.pck
                canvas: document.getElementById("canvas"),
                afterStart: function() {
                    statusEl.style.display = "none"; // Hide loader when complete
                }
            });
        })();
    </script>
</body>
</html>
